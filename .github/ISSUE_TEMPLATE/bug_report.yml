name: Bug Report
description: Create a report to help us reproduce and fix a bug in WingetUpdater.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! For security issues, please refer to our [Security Policy](https://github.com/Zalesny123/WingetUpdater/blob/main/SECURITY.md).
  - type: input
    id: app_version
    attributes:
      label: WingetUpdater Version
      description: Which WingetUpdater release or commit are you running?
      placeholder: e.g. v1.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Windows & PowerShell Version
      description: What version of Windows 10 and PowerShell (5.1/7.x) are you running?
      placeholder: e.g. Windows 10 22H2, PowerShell 7.4.1
    validations:
      required: true
  - type: input
    id: winget_version
    attributes:
      label: winget Version
      description: Run `winget --version` and paste the output.
      placeholder: e.g. v1.7.10861
    validations:
      required: true
  - type: textarea
    id: package
    attributes:
      label: Package ID And Source
      description: Provide the affected winget package ID and source, if applicable.
      placeholder: e.g. Microsoft.PowerToys / winget
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open Start.bat
        2. Click 'Refresh'
        3. Select package '...'
        4. See error '...'
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened, including visible status and exit code when available?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: Paste relevant sanitized logs from `%LOCALAPPDATA%\WingetUpdater\logs`. Please ensure no sensitive data is included.
