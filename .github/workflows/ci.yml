name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.shell }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        shell: [pwsh, powershell]

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Install pinned PowerShell modules
        run: |
          Set-PSRepository -Name 'PSGallery' -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force -SkipPublisherCheck
          Install-Module -Name Pester -RequiredVersion 6.0.1 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run PSScriptAnalyzer
        run: |
          Import-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Force -ErrorAction Stop
          $results = @(Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1)
          if ($results.Count -gt 0) {
              $results | Format-Table -AutoSize
              throw 'PSScriptAnalyzer found issues.'
          }

      - name: Run Pester tests
        run: |
          Import-Module Pester -RequiredVersion 6.0.1 -Force -ErrorAction Stop
          $config = [PesterConfiguration]::Default
          $config.Run.Path = './tests'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config
